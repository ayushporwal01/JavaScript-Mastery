<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Countdown Timer</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="container">
      <h1>Countdown Timer</h1>
      <div class="inputs">
        <input type="number" id="hours" placeholder="HH" min="0" max="23" />
        <input type="number" id="minutes" placeholder="MM" min="0" max="59" />
        <input type="number" id="seconds" placeholder="SS" min="0" max="59" />
      </div>

      <div class="display" id="timer">00:00:00</div>
      <div class="buttons">
        <button id="start">Start</div>
        <button id="pause">Pause</div>
        <button id="reset">Reset</div>
      </div>
    </div>
  </body>
</html>
